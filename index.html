<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lojas Barracão — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:       #f3f4f6;
      --bg-form:       #ffffff;
      --bg-input:      #f9fafb;
      --border:        #e5e7eb;
      --border-focus:  #4f6ef7;
      --text-primary:  #111827;
      --text-secondary:#6b7280;
      --text-muted:    #9ca3af;
      --accent:        #4f6ef7;
      --accent-hover:  #3d5be0;
      --accent-tint:   rgba(79,110,247,0.08);
      --accent-tint-h: rgba(79,110,247,0.14);
      --accent-border: rgba(79,110,247,0.45);
      --social-bg:     #f9fafb;
      --social-bg-h:   #f3f4f6;
      --badge-bg:      #eef0fe;
      --badge-text:    #4f6ef7;
      --divider:       #e5e7eb;
      --shadow:        0 20px 60px rgba(0,0,0,0.10), 0 4px 16px rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:       #0a0a0f;
        --bg-form:       #111118;
        --bg-input:      rgba(255,255,255,0.05);
        --border:        rgba(255,255,255,0.10);
        --text-primary:  #f0f0f8;
        --text-secondary:#9090aa;
        --text-muted:    #6b6b88;
        --social-bg:     rgba(255,255,255,0.04);
        --social-bg-h:   rgba(255,255,255,0.08);
        --accent-tint:   rgba(79,110,247,0.10);
        --accent-tint-h: rgba(79,110,247,0.18);
        --badge-bg:      rgba(79,110,247,0.18);
        --badge-text:    #7b94f9;
        --divider:       rgba(255,255,255,0.08);
        --shadow:        0 20px 60px rgba(0,0,0,0.50), 0 4px 16px rgba(0,0,0,0.30);
      }
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ── Card wrapper ── */
    .card {
      display: flex;
      width: 100%;
      max-width: 720px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 0.5px solid var(--border);
    }

    /* ── Brand panel ── */
    .brand {
      width: 256px;
      flex-shrink: 0;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 36px 28px;
      position: relative;
      overflow: hidden;
    }
    .brand::before {
      content: '';
      position: absolute;
      top: -90px; left: -90px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(79,110,247,0.18) 0%, transparent 68%);
      pointer-events: none;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .brand-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: #4f6ef7;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { display: block; }
    .brand-name {
      font-size: 15px; font-weight: 600;
      color: #f0f0f8; letter-spacing: -0.3px;
    }

    .brand-copy { position: relative; z-index: 1; }
    .brand-headline {
      font-size: 21px; font-weight: 600;
      color: #f0f0f8; line-height: 1.35;
      letter-spacing: -0.5px; margin-bottom: 10px;
    }
    .brand-headline span { color: #7b94f9; }
    .brand-sub { font-size: 12.5px; color: #6b6b88; line-height: 1.6; }

    .brand-footer { position: relative; z-index: 1; }
    .avatars { display: flex; align-items: center; }
    .av {
      width: 28px; height: 28px; border-radius: 50%;
      background: #1e1e2e;
      border: 2px solid #0f0f1a;
      margin-right: -8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; color: #9090aa;
    }
    .av-count {
      font-size: 11px; color: #6b6b88;
      margin-left: 18px;
    }

    /* ── Form panel ── */
    .form-panel {
      flex: 1;
      background: var(--bg-form);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 36px;
    }

    .form-header { margin-bottom: 26px; }
    .form-title {
      font-size: 20px; font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.4px; margin-bottom: 3px;
    }
    .form-sub { font-size: 13px; color: var(--text-muted); }

    /* ── Social buttons ── */
    .social-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .social-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: 11px 16px;
      border-radius: 12px;
      border: 0.5px solid var(--border);
      background: var(--social-bg);
      color: var(--text-primary);
      font-family: inherit; font-size: 14px; font-weight: 500;
      cursor: pointer; text-align: left;
      transition: background 0.14s, border-color 0.14s, transform 0.1s;
    }
    .social-btn:hover {
      background: var(--social-bg-h);
      border-color: var(--border);
      transform: translateY(-1px);
    }
    .social-btn:active { transform: translateY(0); }
    .social-btn.featured {
      border-color: var(--accent-border);
      background: var(--accent-tint);
    }
    .social-btn.featured:hover { background: var(--accent-tint-h); }

    .btn-icon { width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .btn-label { flex: 1; }
    .btn-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 5px;
      background: var(--badge-bg);
      color: var(--badge-text);
      letter-spacing: 0.2px;
    }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 18px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 0.5px; background: var(--divider);
    }

    /* ── Fields ── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .field input {
      width: 100%; padding: 10px 12px;
      border-radius: 9px;
      border: 0.5px solid var(--border);
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: inherit; font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input::placeholder { color: var(--text-muted); }
    .field input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(79,110,247,0.14);
    }

    /* ── Row util ── */
    .row-util {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .check-label {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--text-secondary);
      cursor: pointer; user-select: none;
    }
    .check-label input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; }
    .forgot { font-size: 12px; color: var(--accent); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    /* ── Submit ── */
    .submit-btn {
      width: 100%; padding: 11px;
      border-radius: 12px; border: none;
      background: var(--accent);
      color: #fff;
      font-family: inherit; font-size: 14px; font-weight: 600;
      letter-spacing: -0.1px; cursor: pointer;
      transition: background 0.14s, transform 0.1s;
    }
    .submit-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }

    /* ── Signup ── */
    .signup {
      text-align: center; margin-top: 18px;
      font-size: 12px; color: var(--text-muted);
    }
    .signup a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .signup a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .brand { display: none; }
      .form-panel { padding: 32px 24px; }
    }

    .brand-logo-img {
      width: 168px;
      height: auto;
      display: block;
      background: rgba(255,255,255,0.94);
      border-radius: 10px;
      padding: 10px 14px;
    }
  </style>
</head>

    <!-- Form panel -->

      <!-- Social buttons -->
      <div class="social-group">

      <!-- Email form -->
      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="voce@exemplo.com.br" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <div class="row-util">
          <label class="check-label">
            <input type="checkbox" id="remember" name="remember" />
            Lembrar de mim
          </label>
          <a href="/esqueci-senha" class="forgot">Esqueci a senha</a>
        </div>

        <button type="submit" class="submit-btn">Entrar</button>
      </form>

      <p class="signup">
        Não tem conta? <a href="/cadastro">Criar conta grátis</a>
      </p>

  <script>
    // ── Social OAuth handlers ──────────────────────────────────────────
    function handleSocialLogin(provider) {
      const urls = {
        google:    "/auth/google",
        apple:     "/auth/apple",
        microsoft: "/auth/microsoft"
      };
      // TODO: substitua pela URL do seu provedor OAuth
      window.location.href = urls[provider];
    }

    // ── Email / password form ──────────────────────────────────────────
    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const remember = document.getElementById("remember").checked;
      const btn      = this.querySelector(".submit-btn");

      if (!email || !password) return;

      btn.textContent = "Entrando…";
      btn.disabled = true;

      try {
        // TODO: substitua pela URL da sua API de autenticação
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, remember })
        });

        if (!res.ok) throw new Error("Credenciais inválidas.");

        const data = await res.json();

        // Armazena o token e redireciona
        const storage = remember ? localStorage : sessionStorage;
        storage.setItem("token", data.token);
        window.location.href = "/dashboard";

      } catch (err) {
        btn.textContent = "Entrar";
        btn.disabled = false;
        alert(err.message || "Erro ao entrar. Tente novamente.");
      }
    });
  </script>
