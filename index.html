<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:       #f3f4f6;
      --bg-form:       #ffffff;
      --bg-input:      #f9fafb;
      --border:        #e5e7eb;
      --border-focus:  #4f6ef7;
      --text-primary:  #111827;
      --text-secondary:#6b7280;
      --text-muted:    #9ca3af;
      --accent:        #4f6ef7;
      --accent-hover:  #3d5be0;
      --accent-tint:   rgba(79,110,247,0.08);
      --accent-tint-h: rgba(79,110,247,0.14);
      --accent-border: rgba(79,110,247,0.45);
      --social-bg:     #f9fafb;
      --social-bg-h:   #f3f4f6;
      --badge-bg:      #eef0fe;
      --badge-text:    #4f6ef7;
      --divider:       #e5e7eb;
      --shadow:        0 20px 60px rgba(0,0,0,0.10), 0 4px 16px rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:       #0a0a0f;
        --bg-form:       #111118;
        --bg-input:      rgba(255,255,255,0.05);
        --border:        rgba(255,255,255,0.10);
        --text-primary:  #f0f0f8;
        --text-secondary:#9090aa;
        --text-muted:    #6b6b88;
        --social-bg:     rgba(255,255,255,0.04);
        --social-bg-h:   rgba(255,255,255,0.08);
        --accent-tint:   rgba(79,110,247,0.10);
        --accent-tint-h: rgba(79,110,247,0.18);
        --badge-bg:      rgba(79,110,247,0.18);
        --badge-text:    #7b94f9;
        --divider:       rgba(255,255,255,0.08);
        --shadow:        0 20px 60px rgba(0,0,0,0.50), 0 4px 16px rgba(0,0,0,0.30);
      }
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ── Card wrapper ── */
    .card {
      display: flex;
      width: 100%;
      max-width: 720px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 0.5px solid var(--border);
    }

    /* ── Brand panel ── */
    .brand {
      width: 256px;
      flex-shrink: 0;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 36px 28px;
      position: relative;
      overflow: hidden;
    }
    .brand::before {
      content: '';
      position: absolute;
      top: -90px; left: -90px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(79,110,247,0.18) 0%, transparent 68%);
      pointer-events: none;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .brand-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: #4f6ef7;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { display: block; }
    .brand-name {
      font-size: 15px; font-weight: 600;
      color: #f0f0f8; letter-spacing: -0.3px;
    }

    .brand-copy { position: relative; z-index: 1; }
    .brand-headline {
      font-size: 21px; font-weight: 600;
      color: #f0f0f8; line-height: 1.35;
      letter-spacing: -0.5px; margin-bottom: 10px;
    }
    .brand-headline span { color: #7b94f9; }
    .brand-sub { font-size: 12.5px; color: #6b6b88; line-height: 1.6; }

    .brand-footer { position: relative; z-index: 1; }
    .avatars { display: flex; align-items: center; }
    .av {
      width: 28px; height: 28px; border-radius: 50%;
      background: #1e1e2e;
      border: 2px solid #0f0f1a;
      margin-right: -8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; color: #9090aa;
    }
    .av-count {
      font-size: 11px; color: #6b6b88;
      margin-left: 18px;
    }

    /* ── Form panel ── */
    .form-panel {
      flex: 1;
      background: var(--bg-form);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 36px;
    }

    .form-header { margin-bottom: 26px; }
    .form-title {
      font-size: 20px; font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.4px; margin-bottom: 3px;
    }
    .form-sub { font-size: 13px; color: var(--text-muted); }

    /* ── Social buttons ── */
    .social-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .social-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: 11px 16px;
      border-radius: 12px;
      border: 0.5px solid var(--border);
      background: var(--social-bg);
      color: var(--text-primary);
      font-family: inherit; font-size: 14px; font-weight: 500;
      cursor: pointer; text-align: left;
      transition: background 0.14s, border-color 0.14s, transform 0.1s;
    }
    .social-btn:hover {
      background: var(--social-bg-h);
      border-color: var(--border);
      transform: translateY(-1px);
    }
    .social-btn:active { transform: translateY(0); }
    .social-btn.featured {
      border-color: var(--accent-border);
      background: var(--accent-tint);
    }
    .social-btn.featured:hover { background: var(--accent-tint-h); }

    .btn-icon { width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .btn-label { flex: 1; }
    .btn-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 5px;
      background: var(--badge-bg);
      color: var(--badge-text);
      letter-spacing: 0.2px;
    }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 18px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 0.5px; background: var(--divider);
    }

    /* ── Fields ── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .field input {
      width: 100%; padding: 10px 12px;
      border-radius: 9px;
      border: 0.5px solid var(--border);
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: inherit; font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input::placeholder { color: var(--text-muted); }
    .field input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(79,110,247,0.14);
    }

    /* ── Row util ── */
    .row-util {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .check-label {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--text-secondary);
      cursor: pointer; user-select: none;
    }
    .check-label input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; }
    .forgot { font-size: 12px; color: var(--accent); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    /* ── Submit ── */
    .submit-btn {
      width: 100%; padding: 11px;
      border-radius: 12px; border: none;
      background: var(--accent);
      color: #fff;
      font-family: inherit; font-size: 14px; font-weight: 600;
      letter-spacing: -0.1px; cursor: pointer;
      transition: background 0.14s, transform 0.1s;
    }
    .submit-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }

    /* ── Signup ── */
    .signup {
      text-align: center; margin-top: 18px;
      font-size: 12px; color: var(--text-muted);
    }
    .signup a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .signup a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .brand { display: none; }
      .form-panel { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Brand panel -->
    <aside class="brand" aria-hidden="true">
      <div class="brand-logo">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <span class="brand-name">Nexus</span>
      </div>

      <div class="brand-copy">
        <h2 class="brand-headline">Acesso simples,<br><span>sem complicação</span></h2>
        <p class="brand-sub">Entre com sua conta social em poucos segundos e comece a usar.</p>
      </div>

      <div class="brand-footer">
        <div class="avatars">
          <div class="av">MR</div>
          <div class="av">JC</div>
          <div class="av">LS</div>
          <div class="av">+</div>
          <span class="av-count">+2.400 usuários</span>
        </div>
      </div>
    </aside>

    <!-- Form panel -->
    <main class="form-panel">
      <div class="form-header">
        <h1 class="form-title">Bem-vindo de volta</h1>
        <p class="form-sub">Escolha como deseja entrar</p>
      </div>

      <!-- Social buttons -->
      <div class="social-group">
        <button class="social-btn featured" onclick="handleSocialLogin('google')">
          <span class="btn-icon">
            <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#EA4335" d="M24 9.5c3.18 0 5.67 1.09 7.55 2.82l5.62-5.62C33.83 3.54 29.28 1.5 24 1.5 14.97 1.5 7.3 7.12 4.22 15.12l6.54 5.08C12.3 13.54 17.64 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.1 24.5c0-1.64-.15-3.22-.41-4.74H24v9h12.44c-.54 2.9-2.18 5.36-4.65 7.01l7.18 5.57C43.1 37.13 46.1 31.27 46.1 24.5z"/>
              <path fill="#FBBC05" d="M10.76 28.2A14.63 14.63 0 0 1 9.5 24c0-1.46.25-2.88.7-4.2L3.66 14.72A23.44 23.44 0 0 0 1.5 24c0 3.79.91 7.37 2.52 10.53l6.74-6.33z"/>
              <path fill="#34A853" d="M24 46.5c5.28 0 9.72-1.74 12.97-4.73l-7.18-5.57C27.98 37.9 26.07 38.5 24 38.5c-6.36 0-11.7-4.04-13.24-9.7l-6.74 6.33C6.98 42.94 14.85 46.5 24 46.5z"/>
            </svg>
          </span>
          <span class="btn-label">Entrar com Google</span>
          <span class="btn-badge">Recomendado</span>
        </button>

        <button class="social-btn" onclick="handleSocialLogin('apple')">
          <span class="btn-icon">
            <svg width="19" height="19" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
              <path fill="currentColor" d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 376.8 38 282.4 38 243.5c0-192.8 125.5-294.5 250.8-294.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
            </svg>
          </span>
          <span class="btn-label">Entrar com Apple</span>
        </button>

        <button class="social-btn" onclick="handleSocialLogin('microsoft')">
          <span class="btn-icon">
            <svg width="20" height="20" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
              <rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
              <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/>
              <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
            </svg>
          </span>
          <span class="btn-label">Entrar com Microsoft</span>
        </button>
      </div>

      <!-- Divider -->
      <div class="divider">ou entre com e-mail</div>

      <!-- Email form -->
      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="voce@exemplo.com.br" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <div class="row-util">
          <label class="check-label">
            <input type="checkbox" id="remember" name="remember" />
            Lembrar de mim
          </label>
          <a href="/esqueci-senha" class="forgot">Esqueci a senha</a>
        </div>

        <button type="submit" class="submit-btn">Entrar</button>
      </form>

      <p class="signup">
        Não tem conta? <a href="/cadastro">Criar conta grátis</a>
      </p>
    </main>
  </div>

  <script>
    // ── Social OAuth handlers ──────────────────────────────────────────
    function handleSocialLogin(provider) {
      const urls = {
        google:    "/auth/google",
        apple:     "/auth/apple",
        microsoft: "/auth/microsoft"
      };
      // TODO: substitua pela URL do seu provedor OAuth
      window.location.href = urls[provider];
    }

    // ── Email / password form ──────────────────────────────────────────
    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const remember = document.getElementById("remember").checked;
      const btn      = this.querySelector(".submit-btn");

      if (!email || !password) return;

      btn.textContent = "Entrando…";
      btn.disabled = true;

      try {
        // TODO: substitua pela URL da sua API de autenticação
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, remember })
        });

        if (!res.ok) throw new Error("Credenciais inválidas.");

        const data = await res.json();

        // Armazena o token e redireciona
        const storage = remember ? localStorage : sessionStorage;
        storage.setItem("token", data.token);
        window.location.href = "/dashboard";

      } catch (err) {
        btn.textContent = "Entrar";
        btn.disabled = false;
        alert(err.message || "Erro ao entrar. Tente novamente.");
      }
    });
  </script>

</body>
</html>
